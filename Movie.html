<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สำนักเทพเซียน - ภิภพแดนเซี่ยนวังวนต้องห้สม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Maitree:wght@300;400;600;700&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- HLS.js for m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            /* Theme 1: Heavenly Blue (Home) */
            --bg-blue-dark: #0a1128;
            --bg-blue-light: #1c2e4a;
            --text-blue-primary: #e0f2fe;
            --accent-blue: #7dd3fc;
            --border-silver: #cbd5e1;

            /* Theme 2: Royal Red (Movie Detail) */
            --bg-red-dark: #2a0808;
            --bg-red-light: #4a0d0d;
            --text-red-primary: #fef08a;
            --accent-gold: #fbbf24;
            --border-gold: #d97706;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-blue-dark);
            color: var(--text-blue-primary);
            transition: all 0.5s ease;
            overflow-x: hidden;
            padding-bottom: 70px; /* Space for bottom nav */
            touch-action: manipulation;
        }

        h1, h2, h3, .font-serif-thai {
            font-family: 'Maitree', serif;
        }

        /* --- Theme Classes --- */
        .theme-heaven {
            background: radial-gradient(circle at top, var(--bg-blue-light) 0%, var(--bg-blue-dark) 80%);
            color: var(--text-blue-primary);
        }
        .theme-heaven .glass-panel {
            background: rgba(28, 46, 74, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .theme-heaven .text-accent { color: var(--accent-blue); }
        .theme-heaven .border-accent { border-color: var(--accent-blue); }
        .theme-heaven .nav-active { color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }

        .theme-mortal {
            background: radial-gradient(circle at top, var(--bg-red-light) 0%, var(--bg-red-dark) 80%);
            color: var(--text-red-primary);
        }
        .theme-mortal .glass-panel {
            background: rgba(74, 13, 13, 0.6);
            border: 1px solid rgba(217, 119, 6, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }
        .theme-mortal .text-accent { color: var(--accent-gold); }
        .theme-mortal .border-accent { border-color: var(--accent-gold); }
        .theme-mortal .nav-active { color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold); }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        /* --- Horizontal Scroller --- */
        .movie-row {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1rem;
            padding-bottom: 1rem;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .movie-row::-webkit-scrollbar { display: none; }
        
        .movie-card {
            flex: 0 0 calc(50% - 0.5rem);
            scroll-snap-align: start;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border-radius: 0.5rem;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Desktop specific styles */
        @media (min-width: 768px) {
            .movie-card { flex: 0 0 200px; }
            .auto-scroll-container { overflow: hidden; white-space: nowrap; }
            .auto-scroll-content { display: inline-flex; animation: scrollX 40s linear infinite; }
            .auto-scroll-content:hover { animation-play-state: paused; }
            @keyframes scrollX {
                0% { transform: translateX(0); }
                100% { transform: translateX(-50%); }
            }
        }

        .movie-card:hover {
            transform: translateY(-5px) scale(1.02);
            z-index: 10;
        }

        .movie-poster-container {
            width: 100%;
            aspect-ratio: 2/3;
            position: relative;
            overflow: hidden;
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-bottom: 2px solid transparent;
        }
        
        .theme-heaven .movie-poster { border-bottom-color: var(--accent-blue); }
        .theme-mortal .movie-poster { border-bottom-color: var(--accent-gold); }

        /* --- AI Chat --- */
        #ai-chat-modal { backdrop-filter: blur(5px); }
        .chat-bubble-ai { background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(50,50,50,0.9)); border-left: 3px solid var(--accent-gold); border-radius: 10px 10px 10px 0; }
        .chat-bubble-user { background: rgba(255,255,255,0.1); border-right: 3px solid var(--accent-blue); border-radius: 10px 10px 0 10px; text-align: right; }

        /* Video Player Wrapper */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 0.5rem;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .mystic-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            pointer-events: none;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="theme-heaven" id="app-body">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-40 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
            <i class="fa-solid fa-yin-yang text-3xl text-accent animate-spin-slow" style="animation: spin 10s linear infinite;"></i>
            <h1 class="text-2xl font-bold tracking-wider font-serif-thai text-accent text-shadow-glow">
                สำนักเทพเซียน
            </h1>
        </div>
        <div class="text-sm opacity-80" id="header-user-status">
            <i class="fa-solid fa-cloud"></i> ดินแดนศักดิ์สิทธิ์
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="p-4 min-h-screen"></main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full glass-panel flex justify-around items-center p-3 z-40 border-t border-accent rounded-t-2xl">
        <button onclick="navigate('home')" class="flex flex-col items-center gap-1 w-1/3 text-gray-400 hover:text-white transition-colors" id="nav-home">
            <i class="fa-solid fa-home text-xl"></i>
            <span class="text-xs">หน้าหลัก</span>
        </button>
        <button onclick="navigate('history')" class="flex flex-col items-center gap-1 w-1/3 text-gray-400 hover:text-white transition-colors" id="nav-history">
            <i class="fa-solid fa-history text-xl"></i>
            <span class="text-xs">ประวัติเข้าชม</span>
        </button>
        <button onclick="navigate('downloads')" class="flex flex-col items-center gap-1 w-1/3 text-gray-400 hover:text-white transition-colors" id="nav-downloads">
            <i class="fa-solid fa-bookmark text-xl"></i>
            <span class="text-xs">หอเก็บคัมภีร์</span>
        </button>
    </nav>

    <!-- AI Grandmaster Button -->
    <button onclick="toggleAIChat()" class="fixed bottom-20 right-4 z-50 w-14 h-14 rounded-full bg-gradient-to-r from-yellow-600 to-yellow-400 flex items-center justify-center shadow-[0_0_15px_rgba(251,191,36,0.6)] hover:scale-110 transition-transform">
        <i class="fa-solid fa-user-tie text-2xl text-black"></i>
    </button>

    <!-- AI Chat Modal -->
    <div id="ai-chat-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end p-4">
        <div class="glass-panel w-full max-w-lg mx-auto rounded-t-2xl overflow-hidden flex flex-col h-[80vh] border-t-2 border-x-2 border-accent-gold">
            <div class="p-4 bg-gradient-to-b from-black to-transparent flex justify-between items-center border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-yellow-600 flex items-center justify-center text-black">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div>
                        <h3 class="font-serif-thai font-bold text-yellow-500">บรรพจารย์รู้แจ้ง</h3>
                        <p class="text-xs text-gray-300">ปรมาจารย์แห่งหอตำรา</p>
                    </div>
                </div>
                <button onclick="toggleAIChat()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col font-serif-thai">
                <div class="chat-bubble-ai p-3 self-start max-w-[80%] text-sm text-yellow-100 shadow-md">
                    คารวะศิษย์น้อง เจ้าต้องการให้ข้าค้นหาคัมภีร์เรื่องใด หรืออยากให้ข้าแนะนำเรื่องไหนให้ บอกมาได้เลย...
                </div>
            </div>

            <div class="p-3 border-t border-gray-700 bg-black/50 flex gap-2 items-center">
                <button id="voice-btn" onclick="toggleVoice()" class="p-2 text-yellow-500 hover:text-yellow-300 transition-colors">
                    <i class="fa-solid fa-volume-high" id="voice-icon"></i>
                </button>
                <input type="text" id="chat-input" placeholder="พิมพ์ชื่อหนัง หรือแนวที่อยากดู..." class="flex-1 bg-gray-900 border border-gray-700 rounded-full px-4 py-2 text-sm text-white focus:outline-none focus:border-yellow-500" onkeypress="handleChatEnter(event)">
                <button onclick="sendChatMessage()" class="w-10 h-10 rounded-full bg-yellow-600 flex items-center justify-center text-black hover:bg-yellow-500">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. System Configuration & API ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx8Zw7yc9QlPrU9PeaJ6koVbk9UqAZhRIDUSxKvqhQnyc5sp27V0rkxb5FbNKivIfhi/exec";
        let movies = []; 

        // --- 2. State Management ---
        let state = {
            view: 'home',
            currentMovieId: null,
            history: [], // ประวัติการดู
            downloads: [], // ประวัติการบันทึก (Bookmark/Download)
            voiceEnabled: true
        };

        let currentUser = null;
        try {
            const savedUser = localStorage.getItem('nextLiveUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            }
        } catch(e){}

        // --- 3. UNIVERSAL VIDEO PARSER ---
        function parseVideoUrl(url) {
            if (!url) return { type: 'unknown', url: '' };
            
            // 1. YouTube
            const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))([\w-]{11})/);
            if (ytMatch) return { type: 'youtube', url: ytMatch[1] };
            
            // 2. Google Drive
            const driveMatch = url.match(/(?:drive\.google\.com\/(?:file\/d\/|open\?id=|file\/d\/))([-\w]{25,})/);
            if (driveMatch) return { type: 'gdrive', url: driveMatch[1] };
            
            // 3. Dropbox
            if (url.includes('dropbox.com')) {
                let directUrl = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
                if (!directUrl.includes('raw=1') && !directUrl.includes('dl.dropboxusercontent.com')) {
                    directUrl += (directUrl.includes('?') ? '&' : '?') + 'raw=1';
                }
                return { type: 'dropbox', url: directUrl };
            }
            
            // 4. Facebook Reels / Videos
            if (url.includes('facebook.com') || url.includes('fb.watch')) {
                return { type: 'facebook', url: url };
            }
            
            // 5. Instagram Reels / TV
            const igMatch = url.match(/instagram\.com\/(?:p|reel)\/([A-Za-z0-9_-]+)/);
            if (igMatch) return { type: 'instagram', url: igMatch[1] };
            
            // 6. M3U8 Stream
            if (url.includes('.m3u8')) return { type: 'm3u8', url: url };
            
            // 7. MP4 or any direct media
            return { type: 'mp4', url: url };
        }

        // --- 4. PLAYER GENERATOR ---
        function generatePlayerHtml(videoObj) {
            const { type, url } = videoObj;
            if (!url) return `<div class="w-full h-full flex items-center justify-center bg-black text-gray-500 font-serif-thai">ไม่มีลิงก์วิดีโอ</div>`;

            switch(type) {
                case 'youtube':
                    return `<iframe src="https://www.youtube.com/embed/${url}?autoplay=1&rel=0&modestbranding=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen class="w-full h-full absolute top-0 left-0"></iframe>`;
                
                case 'gdrive':
                    return `<iframe src="https://drive.google.com/file/d/${url}/preview" frameborder="0" allow="autoplay; fullscreen" class="w-full h-full absolute top-0 left-0"></iframe>`;
                
                case 'facebook':
                    return `<iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&autoplay=1" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" class="w-full h-full absolute top-0 left-0 bg-black"></iframe>`;
                
                case 'instagram':
                    return `<iframe src="https://www.instagram.com/p/${url}/embed/" frameborder="0" scrolling="no" allowtransparency="true" class="w-full h-full absolute top-0 left-0 bg-white"></iframe>`;
                
                case 'm3u8':
                    return `<video id="video-player-stream" controls autoplay playsinline class="w-full h-full absolute top-0 left-0 object-contain bg-black"></video>`;
                
                case 'dropbox':
                case 'mp4':
                default:
                    return `<video src="${url}" controls autoplay playsinline class="w-full h-full absolute top-0 left-0 object-contain bg-black"></video>`;
            }
        }

        function initializePlayer(videoObj) {
            const container = document.getElementById('player-container-box');
            if (!container) return;
            
            container.innerHTML = generatePlayerHtml(videoObj);
            
            if (videoObj.type === 'm3u8') {
                const video = document.getElementById('video-player-stream');
                if (video) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(videoObj.url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = videoObj.url;
                        video.play();
                    }
                }
            }
        }

        // --- 5. View Rendering ---
        const mainContent = document.getElementById('main-content');
        const body = document.getElementById('app-body');

        async function fetchMoviesFromAPI() {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-[60vh] text-accent">
                    <i class="fa-solid fa-yin-yang fa-spin text-5xl mb-4"></i>
                    <h2 class="font-serif-thai text-xl animate-pulse">กำลังปลดผนึกหอตำรา...</h2>
                </div>`;
            
            if(currentUser) {
                document.getElementById('header-user-status').innerHTML = `<i class="fa-solid fa-user-circle text-accent"></i> ${currentUser.fname}`;
            }

            try {
                // 1. Fetch All Movies
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getMoviesData' })
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    movies = data.movies.map((m, idx) => {
                        let vidUrl = m.episodes && m.episodes.length > 0 ? m.episodes[0].url : '';
                        let videoObj = parseVideoUrl(vidUrl); 
                        
                        return {
                            id: m.id || String(idx),
                            title: m.title || 'เรื่องไร้นาม',
                            category: m.category || 'มาใหม่ (New)',
                            description: m.desc || 'ไม่มีบันทึกกล่าวถึงคัมภีร์เล่มนี้...',
                            cover: m.cover || m.poster || 'https://via.placeholder.com/500x750/1c2e4a/7dd3fc?text=No+Cover',
                            episodes: m.episodes ? m.episodes.length : 1,
                            rating: (Math.random() * 2 + 8).toFixed(1),
                            video: videoObj,
                            rawEpisodes: m.episodes || [] 
                        };
                    });

                    // 2. Fetch User Data (History & Downloads)
                    if (currentUser) {
                        try {
                            const uRes = await fetch(GAS_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'getUserMovieData', email: currentUser.email, phone: currentUser.phone })
                            });
                            const uData = await uRes.json();
                            if(uData.status === 'success') {
                                state.history = uData.history || [];
                                state.downloads = uData.downloads || [];
                            }
                        } catch(e){}
                    } else {
                        // Load from LocalStorage for GUEST
                        let localH = localStorage.getItem('guest_movie_history');
                        let localD = localStorage.getItem('guest_movie_downloads');
                        if(localH) state.history = JSON.parse(localH);
                        if(localD) state.downloads = JSON.parse(localD);
                    }

                    navigate('home');
                } else {
                    mainContent.innerHTML = `<div class="text-center mt-20 text-red-400 font-serif-thai">ไม่สามารถทะลวงค่ายกลได้: ${data.message}</div>`;
                }
            } catch (error) {
                mainContent.innerHTML = `<div class="text-center mt-20 text-red-400 font-serif-thai">เกิดเหตุขัดข้อง ไม่สามารถเชื่อมต่อกับโลกภายนอกได้</div>`;
            }
        }

        function updateNavState() {
            ['home', 'history', 'downloads'].forEach(nav => {
                document.getElementById(`nav-${nav}`).classList.remove('nav-active', 'text-white');
                if (state.view === nav) {
                    document.getElementById(`nav-${nav}`).classList.add('nav-active', 'text-white');
                }
            });
        }

        function navigate(view, data = null) {
            if(movies.length === 0 && view !== 'home') return; 

            state.view = view;
            updateNavState();
            window.scrollTo(0, 0);

            if (view === 'home') {
                body.className = 'theme-heaven';
                renderHome();
            } else if (view === 'movie') {
                body.className = 'theme-mortal';
                state.currentMovieId = data;
                addToHistory(data);
                renderMovie(data);
            } else if (view === 'history') {
                body.className = 'theme-heaven';
                renderHistory();
            } else if (view === 'downloads') {
                body.className = 'theme-heaven';
                renderDownloads();
            }
        }

        function renderHome() {
            if(movies.length === 0) return;

            let html = `<div class="mb-6">
                <h2 class="text-3xl font-bold mb-2 text-accent font-serif-thai text-shadow-glow">ดินแดนเทพเซียน</h2>
                <p class="text-sm opacity-80">ค้นพบคัมภีร์ซีรีส์และภาพยนตร์ล้ำค่า</p>
            </div>`;

            const categories = [...new Set(movies.map(m => m.category))];

            categories.forEach((cat, index) => {
                const catMovies = movies.filter(m => m.category === cat);
                if(catMovies.length === 0) return;
                
                const isDesktop = window.innerWidth >= 768;
                let rowWrapperClass = "movie-row";
                let contentClass = "";
                
                if(isDesktop && index === 0) {
                     rowWrapperClass = "auto-scroll-container";
                     contentClass = "auto-scroll-content";
                }

                html += `
                    <div class="mb-8">
                        <div class="flex items-center gap-2 mb-4">
                            <i class="fa-solid fa-scroll text-accent"></i>
                            <h3 class="text-xl font-bold font-serif-thai">${cat}</h3>
                        </div>
                        <div class="${rowWrapperClass}">
                            <div class="${contentClass} flex gap-4 w-full">
                                ${catMovies.map(movie => `
                                    <div class="movie-card glass-panel flex-shrink-0" onclick="navigate('movie', '${movie.id}')">
                                        <div class="movie-poster-container">
                                            <img src="${movie.cover}" class="movie-poster" alt="${movie.title}">
                                            <div class="mystic-overlay flex items-end p-2 pb-3">
                                                <span class="text-xs font-bold bg-blue-900/90 px-2 py-1 rounded text-white border border-blue-400 shadow-lg">
                                                    ${movie.episodes} คัมภีร์
                                                </span>
                                            </div>
                                            <div class="absolute top-2 right-2 bg-black/70 px-2 py-1 rounded text-xs text-yellow-400 border border-yellow-600/50 shadow-md">
                                                <i class="fa-solid fa-star"></i> ${movie.rating}
                                            </div>
                                        </div>
                                        <div class="p-3 text-center h-[3.5rem] flex items-center justify-center bg-black/20">
                                            <h4 class="font-bold text-sm line-clamp-2 font-serif-thai text-blue-100">${movie.title}</h4>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            mainContent.innerHTML = html;
        }

        window.playEpisode = function(url) {
            const videoObj = parseVideoUrl(url);
            initializePlayer(videoObj);
        }

        function renderMovie(id) {
            const movie = movies.find(m => m.id === String(id));
            if (!movie) return;

            let epsHtml = '';
            if(movie.rawEpisodes && movie.rawEpisodes.length > 0) {
                movie.rawEpisodes.forEach((ep, index) => {
                    let epUrl = ep.url;
                    epsHtml += `<button onclick="playEpisode('${epUrl}')" class="px-2 py-2 glass-panel rounded hover:bg-yellow-900 hover:text-white transition-colors border-accent text-sm whitespace-nowrap">${ep.title || 'คัมภีร์ที่ ' + (index+1)}</button>`;
                });
            } else {
                epsHtml = `<span class="text-sm text-gray-400">ไม่มีแยกตอนย่อย</span>`;
            }

            // เช็คว่าเก็บคัมภีร์หรือยัง
            let isDownloaded = state.downloads.includes(String(movie.id));
            let dlBtnClass = isDownloaded ? 'bg-green-900 text-green-400 border-green-500' : 'bg-red-900/50 hover:bg-red-800 text-yellow-500 border-yellow-600';
            let dlIcon = isDownloaded ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-bookmark"></i>';

            let html = `
                <div class="animate-fade-in">
                    <!-- Back Button -->
                    <button onclick="navigate('home')" class="mb-4 text-gray-400 hover:text-accent transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> กลับสู่หน้าหลัก
                    </button>

                    <!-- Player Container -->
                    <div class="video-container mb-6 shadow-glow-red" id="player-container-box">
                        <!-- Player is injected here by initializePlayer() -->
                    </div>

                    <!-- Details -->
                    <div class="glass-panel p-5 rounded-xl mb-6 border-accent">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-3xl font-bold font-serif-thai text-accent text-shadow-glow">${movie.title}</h2>
                            <button onclick="downloadMovie('${movie.id}')" class="${dlBtnClass} border p-2 rounded-full w-10 h-10 flex items-center justify-center transition-all shadow-md flex-shrink-0 ml-2">
                                ${dlIcon}
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2 text-xs mb-4 text-gray-300">
                            <span class="bg-red-900/80 px-2 py-1 rounded">หมวด: ${movie.category.split(' ')[0]}</span>
                            <span class="bg-red-900/80 px-2 py-1 rounded"><i class="fa-solid fa-star text-yellow-400"></i> ${movie.rating}</span>
                            <span class="bg-red-900/80 px-2 py-1 rounded border border-red-500/50">ทั้งหมด ${movie.episodes} คัมภีร์</span>
                        </div>
                        <p class="text-sm leading-relaxed text-gray-200 font-serif-thai border-l-2 border-accent pl-3 whitespace-pre-wrap">
                            ${movie.description}
                        </p>
                    </div>

                    <!-- Episodes -->
                    <div class="pb-8">
                        <h3 class="text-xl font-bold mb-4 font-serif-thai text-accent flex items-center gap-2">
                            <i class="fa-solid fa-layer-group"></i> เลือกคัมภีร์
                        </h3>
                        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                            ${epsHtml}
                        </div>
                    </div>
                </div>
            `;

            mainContent.innerHTML = html;
            
            // Build the appropriate player for the default (first) episode
            initializePlayer(movie.video);
        }

        function renderHistory() {
            let html = `
                <div class="mb-6">
                    <h2 class="text-3xl font-bold mb-2 text-accent font-serif-thai">ประวัติการเข้าชม</h2>
                    <p class="text-sm opacity-80">เรื่องที่ท่านเคยเปิดอ่านคัมภีร์</p>
                </div>
            `;

            if (state.history.length === 0) {
                html += `<div class="text-center py-10 text-gray-500 font-serif-thai"><i class="fa-solid fa-eye-slash text-4xl mb-3 opacity-50"></i><br>ท่านยังไม่เคยเปิดอ่านคัมภีร์เล่มใดเลย</div>`;
            } else {
                html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">`;
                // แสดงเรื่องล่าสุดก่อน (reverse order ของการบันทึก)
                state.history.slice().reverse().forEach(id => {
                    const movie = movies.find(m => m.id === String(id));
                    if(movie) {
                        html += `
                            <div class="movie-card glass-panel" onclick="navigate('movie', '${movie.id}')">
                                <div class="movie-poster-container">
                                    <img src="${movie.cover}" class="movie-poster" alt="${movie.title}">
                                    <div class="mystic-overlay flex items-end p-2 pb-3">
                                        <span class="text-xs font-bold bg-blue-900/90 px-2 py-1 rounded text-white border border-blue-400">
                                            ${movie.episodes} คัมภีร์
                                        </span>
                                    </div>
                                </div>
                                <div class="p-3 text-center h-[3.5rem] flex items-center justify-center bg-black/20">
                                    <h4 class="font-bold text-sm line-clamp-2 font-serif-thai">${movie.title}</h4>
                                </div>
                            </div>
                        `;
                    }
                });
                html += `</div>`;
            }
            mainContent.innerHTML = html;
        }

        function renderDownloads() {
             let html = `
                <div class="mb-6">
                    <h2 class="text-3xl font-bold mb-2 text-accent font-serif-thai">หอเก็บคัมภีร์</h2>
                    <p class="text-sm opacity-80">เรื่องที่ท่านเก็บไว้ (Bookmarks / Downloads)</p>
                </div>
            `;

            if (state.downloads.length === 0) {
                html += `<div class="text-center py-10 text-gray-500 font-serif-thai"><i class="fa-solid fa-box-open text-4xl mb-3 opacity-50"></i><br>หอเก็บคัมภีร์ยังว่างเปล่า</div>`;
            } else {
                html += `<div class="space-y-3">`;
                state.downloads.slice().reverse().forEach(id => {
                    const movie = movies.find(m => m.id === String(id));
                    if(movie) {
                        html += `
                            <div class="glass-panel p-3 flex gap-4 items-center rounded-xl cursor-pointer hover:bg-blue-900/30" onclick="navigate('movie', '${movie.id}')">
                                <div class="w-16 h-24 flex-shrink-0">
                                    <img src="${movie.cover}" class="w-full h-full object-cover rounded border border-blue-500/50">
                                </div>
                                <div class="flex-1">
                                    <h4 class="font-bold font-serif-thai text-blue-100 line-clamp-2">${movie.title}</h4>
                                    <p class="text-xs text-gray-400 mt-1">${movie.episodes} คัมภีร์ • เก็บบันทึกแล้ว</p>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-green-900/50 text-green-400 border border-green-500/50 flex items-center justify-center flex-shrink-0">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                            </div>
                        `;
                    }
                });
                html += `</div>`;
            }
            mainContent.innerHTML = html;
        }

        // --- 6. Logic Functions ---
        function addToHistory(id) {
            // ไม่ให้ซ้ำ และดันขึ้นมาเป็นอันล่าสุด
            state.history = state.history.filter(item => item !== String(id)); 
            state.history.push(String(id));
            
            if (currentUser) {
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'recordMovieWatch',
                        uid: currentUser.uid,
                        email: currentUser.email,
                        phone: currentUser.phone,
                        movieId: id,
                        movieTitle: movies.find(m=>m.id === String(id))?.title || 'Unknown'
                    })
                }).catch(e=>{});
            } else {
                localStorage.setItem('guest_movie_history', JSON.stringify(state.history));
            }
        }

        function downloadMovie(id) {
            if(!state.downloads.includes(String(id))) {
                state.downloads.push(String(id));
                const btn = event.currentTarget;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                
                if (currentUser) {
                    fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'recordMovieDownload',
                            uid: currentUser.uid,
                            email: currentUser.email,
                            phone: currentUser.phone,
                            movieId: id,
                            movieTitle: movies.find(m=>m.id === String(id))?.title || 'Unknown'
                        })
                    }).catch(e => console.log(e));
                } else {
                    localStorage.setItem('guest_movie_downloads', JSON.stringify(state.downloads));
                }

                setTimeout(() => {
                    alertModal(`เก็บบันทึกคัมภีร์ลงในหอเก็บเรียบร้อยแล้ว`);
                    // หลังจากบันทึกเสร็จให้พาไปหน้าหอเก็บคัมภีร์ (Downloads) ทันที
                    navigate('downloads');
                }, 1000);
            } else {
                // หากกดซ้ำ (บันทึกอยู่แล้ว) จะพาไปหน้าดาวน์โหลดเลยเช่นกัน
                navigate('downloads');
            }
        }

        function alertModal(msg) {
            const div = document.createElement('div');
            div.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 glass-panel bg-black/90 px-6 py-3 rounded-full z-50 animate-bounce border-accent text-sm font-serif-thai shadow-glow';
            div.innerHTML = `<i class="fa-solid fa-bell text-yellow-500 mr-2"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // --- AI Chat Logic ---
        function toggleAIChat() {
            const modal = document.getElementById('ai-chat-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => document.getElementById('chat-input').focus(), 100);
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        function toggleVoice() {
            state.voiceEnabled = !state.voiceEnabled;
            const icon = document.getElementById('voice-icon');
            if (state.voiceEnabled) {
                icon.className = 'fa-solid fa-volume-high';
                icon.parentElement.classList.replace('text-gray-500', 'text-yellow-500');
            } else {
                icon.className = 'fa-solid fa-volume-xmark';
                icon.parentElement.classList.replace('text-yellow-500', 'text-gray-500');
                window.speechSynthesis.cancel(); 
            }
        }

        function handleChatEnter(e) {
            if (e.key === 'Enter') sendChatMessage();
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            addChatMessage(text, 'user');
            input.value = '';

            setTimeout(() => {
                let replyHTML = '';
                let speakTextContent = '';
                const searchResults = movies.filter(m => m.title.includes(text) || m.description.includes(text) || m.category.includes(text));

                if (text.includes('สวัสดี') || text.includes('ทักทาย')) {
                    replyHTML = 'คารวะผู้ฝึกตน มีสิ่งใดให้ผู้อาวุโสผู้นี้ชี้แนะหรือไม่? อยากให้ข้าค้นหาคัมภีร์เรื่องใด?';
                    speakTextContent = replyHTML;
                } else if (text.includes('แนะนำ') || text.includes('น่าดู')) {
                    const random = movies[Math.floor(Math.random() * movies.length)];
                    speakTextContent = `ข้าขอแนะนำตำราวิชา ${random.title} รับรองว่าท่านจะต้องตื่นตาตื่นใจเป็นแน่แท้`;
                    
                    replyHTML = `ข้าขอแนะนำตำราวิชา <b>"${random.title}"</b> รับรองว่าท่านจะต้องตื่นตาตื่นใจเป็นแน่แท้`;
                    replyHTML += `<div class="mt-3 bg-yellow-900/40 border border-yellow-600/50 p-3 rounded flex gap-3 items-center">
                                    <img src="${random.cover}" class="w-12 h-16 object-cover rounded border border-yellow-700/50">
                                    <div class="flex flex-col gap-1">
                                        <div class="font-bold text-yellow-300 line-clamp-1">${random.title}</div>
                                        <button onclick="navigate('movie', '${random.id}'); toggleAIChat();" class="text-xs bg-yellow-600 px-3 py-1.5 rounded text-black font-bold hover:bg-yellow-500 w-fit">เปิดอ่านคัมภีร์</button>
                                    </div>
                                  </div>`;
                } else if (searchResults.length > 0) {
                    speakTextContent = `อา... ข้าพบคัมภีร์ที่ท่านตามหาแล้ว มีทั้งหมด ${searchResults.length} เรื่องด้วยกัน`;
                    replyHTML = `อา... ข้าพบคัมภีร์ที่ท่านตามหาแล้ว มีดังนี้:<br>`;
                    
                    searchResults.slice(0, 3).forEach(m => {
                        replyHTML += `<div class="mt-3 bg-yellow-900/40 border border-yellow-600/50 p-3 rounded flex gap-3 items-center">
                                        <img src="${m.cover}" class="w-12 h-16 object-cover rounded border border-yellow-700/50">
                                        <div class="flex flex-col gap-1">
                                            <div class="font-bold text-yellow-300 line-clamp-1">${m.title}</div>
                                            <button onclick="navigate('movie', '${m.id}'); toggleAIChat();" class="text-xs bg-yellow-600 px-3 py-1.5 rounded text-black font-bold hover:bg-yellow-500 w-fit">เปิดอ่านคัมภีร์</button>
                                        </div>
                                      </div>`;
                    });
                    
                    if(searchResults.length > 3) {
                        replyHTML += `<div class="text-xs mt-2 text-yellow-400/80">และเรื่องอื่นๆ อีก ${searchResults.length - 3} เรื่อง...</div>`;
                    }
                } else {
                    speakTextContent = 'น่าเสียดาย หอคัมภีร์ของเรายังไม่มีบันทึกเรื่องราวที่ท่านตามหา ลองค้นหาด้วยคำอื่นดูเถิด...';
                    replyHTML = speakTextContent;
                }

                addChatMessage(replyHTML, 'ai');
                speakText(speakTextContent); 
            }, 600);
        }

        function addChatMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            
            if (sender === 'user') {
                div.className = 'chat-bubble-user p-3 self-end max-w-[80%] text-sm text-blue-100 shadow-md';
                div.textContent = text; 
            } else {
                div.className = 'chat-bubble-ai p-3 self-start max-w-[85%] text-sm text-yellow-100 shadow-md';
                div.innerHTML = text; 
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function speakText(text) {
            if (!state.voiceEnabled || !('speechSynthesis' in window)) return;
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 1.0; 
            utterance.pitch = 0.8; 
            window.speechSynthesis.speak(utterance);
        }

        // Add some global CSS animations dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            .text-shadow-glow { text-shadow: 0 0 15px currentColor; }
            .shadow-glow-red { box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
            @keyframes spin-slow { 100% { transform: rotate(360deg); } }
            .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        `;
        document.head.appendChild(style);

        window.onload = fetchMoviesFromAPI;

    </script>
</body>
</html>
