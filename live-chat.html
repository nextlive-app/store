<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Live Chat  | Next Live</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }

        .chat-background {
            background-color: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e2e8f0' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .msg-bubble {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 80%;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sticker-bubble { max-width: 50%; position: relative; animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .typing-dot { width: 6px; height: 6px; background-color: #e43a3d; border-radius: 50%; display: inline-block; animation: typingBounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.6; } 40% { transform: scale(1.2); opacity: 1; } }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 12px); }
        input[type="text"] { font-size: 16px; } 

        .avatar-left { position: absolute; top: -15px; left: -15px; border: 2px solid white; z-index: 10; }
        .avatar-right { position: absolute; top: -15px; right: -15px; border: 2px solid white; z-index: 10; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex flex-col h-[100dvh] w-full overflow-hidden text-gray-800 relative">

    <!-- 1. Guest Form -->
    <div id="guest-screen" class="fixed inset-0 bg-[#0f1115] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-red-100 text-[#e43a3d] rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="ph-fill ph-headset text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Live Support</h2>
            <p class="text-sm text-gray-500 mb-6">กรุณาระบุชื่อและเบอร์โทรศัพท์เพื่อเริ่มสนทนากับเจ้าหน้าที่</p>
            <form onsubmit="startGuestChat(event)" class="space-y-4">
                <div><input type="text" id="guest-name" required placeholder="ชื่อของคุณ" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#e43a3d] transition"></div>
                <div><input type="tel" id="guest-phone" required placeholder="เบอร์โทรศัพท์" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-[#e43a3d] transition"></div>
                <button type="submit" id="btn-start-chat" class="w-full bg-[#e43a3d] hover:bg-red-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors flex justify-center items-center gap-2">
                    <i class="ph-fill ph-chat-circle-dots text-lg"></i> เริ่มสนทนา
                </button>
            </form>
        </div>
    </div>

    <!-- 2. Chat Room -->
    <div id="chat-room" class="flex flex-col h-full hidden">
        <header class="flex items-center justify-between px-4 py-3 bg-white z-20 shadow-sm border-b border-gray-100 shrink-0">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-red-100 text-[#e43a3d] rounded-full flex items-center justify-center border border-red-200"><i class="ph-fill ph-headset text-xl"></i></div>
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-gray-800 leading-tight">Admin Support</h1>
                    <p class="text-[11px] text-green-500 font-medium">ออนไลน์ - พร้อมให้บริการ</p>
                </div>
            </div>
            <button onclick="window.close()" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 rounded-full hover:bg-gray-100 transition"><i class="ph ph-x text-lg"></i></button>
        </header>

        <main id="chat-container" class="flex-1 chat-background overflow-y-auto no-scrollbar p-5 space-y-6 flex flex-col relative" onclick="closePanels()">
            <!-- Message ต้อนรับ -->
            <div class="flex flex-col items-start mt-2 mb-2">
                <div class="msg-bubble bg-white text-gray-700 py-3 px-5 pr-4 rounded-2xl rounded-tl-none border border-gray-100 text-sm">
                    <div class="w-8 h-8 rounded-full avatar-left bg-red-100 text-[#e43a3d] shadow-sm flex items-center justify-center"><i class="ph-fill ph-headset text-lg"></i></div>
                    สวัสดีค่ะ ทีมงาน Next Live ยินดีให้บริการค่ะ 💖 มีอะไรให้แอดมินช่วยเหลือแจ้งได้เลยนะคะ
                </div>
            </div>

            <!-- Dynamic Messages list -->
            <div id="messages-list" class="flex flex-col space-y-5"></div>

            <!-- Typing Indicator -->
            <div class="flex flex-col items-start mt-2" id="typing-indicator" style="display: none;">
                <div class="msg-bubble bg-white py-3 px-5 rounded-full rounded-tl-none flex items-center gap-1.5 h-[40px] border border-gray-100">
                    <div class="w-8 h-8 rounded-full avatar-left bg-red-100 text-[#e43a3d] shadow-sm flex items-center justify-center"><i class="ph-fill ph-headset text-lg"></i></div>
                    <span class="typing-dot bg-gray-400"></span>
                    <span class="typing-dot bg-gray-400"></span>
                    <span class="typing-dot bg-gray-400"></span>
                </div>
            </div>
            <div id="chat-bottom-anchor" class="h-2"></div>
        </main>

        <!-- Emoji/Sticker Panel -->
        <div id="emoji-panel" class="absolute bottom-[70px] left-2 right-2 md:left-auto md:right-4 md:w-96 bg-white border border-gray-200 shadow-2xl rounded-2xl flex flex-col z-30 transition-all duration-300 transform scale-95 opacity-0 pointer-events-none h-64">
            <div class="flex border-b border-gray-100">
                <button class="flex-1 py-2 text-sm font-bold text-[#e43a3d] border-b-2 border-[#e43a3d]" id="tab-emoji" onclick="switchTab('emoji')">อิโมจิ</button>
                <button class="flex-1 py-2 text-sm font-bold text-gray-400 hover:text-gray-600" id="tab-sticker" onclick="switchTab('sticker')">สติกเกอร์</button>
            </div>
            <div id="grid-emoji" class="flex-1 overflow-y-auto p-2 grid grid-cols-6 gap-1 text-2xl no-scrollbar">
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('😀')">😀</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('😂')">😂</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('🥰')">🥰</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('😎')">😎</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('😭')">😭</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('🙏')">🙏</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('🎉')">🎉</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('❤️')">❤️</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('🔥')">🔥</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('✨')">✨</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('👍')">👍</button>
                <button class="hover:bg-gray-100 rounded transition" onclick="insertEmoji('🥺')">🥺</button>
            </div>
            <div id="grid-sticker" class="flex-1 overflow-y-auto p-4 grid grid-cols-4 gap-4 hidden no-scrollbar">
                <button class="hover:scale-110 transition transform active:scale-95" onclick="sendSticker('https://api.iconify.design/noto:partying-face.svg?width=100')"><img src="https://api.iconify.design/noto:partying-face.svg?width=100" class="w-full drop-shadow-md"></button>
                <button class="hover:scale-110 transition transform active:scale-95" onclick="sendSticker('https://api.iconify.design/noto:red-heart.svg?width=100')"><img src="https://api.iconify.design/noto:red-heart.svg?width=100" class="w-full drop-shadow-md"></button>
                <button class="hover:scale-110 transition transform active:scale-95" onclick="sendSticker('https://api.iconify.design/noto:rocket.svg?width=100')"><img src="https://api.iconify.design/noto:rocket.svg?width=100" class="w-full drop-shadow-md"></button>
                <button class="hover:scale-110 transition transform active:scale-95" onclick="sendSticker('https://api.iconify.design/noto:thumbs-up.svg?width=100')"><img src="https://api.iconify.design/noto:thumbs-up.svg?width=100" class="w-full drop-shadow-md"></button>
                <button class="hover:scale-110 transition transform active:scale-95" onclick="sendSticker('https://api.iconify.design/noto:pleading-face.svg?width=100')"><img src="https://api.iconify.design/noto:pleading-face.svg?width=100" class="w-full drop-shadow-md"></button>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="bg-white p-2 md:p-3 pb-safe border-t border-gray-200 relative z-40 shrink-0">
            <div class="flex items-end gap-2 max-w-4xl mx-auto bg-gray-50 rounded-full px-3 py-1.5 border border-gray-200 focus-within:border-blue-400 transition-colors">
                <button class="p-1.5 text-gray-400 hover:text-blue-500 transition shrink-0" onclick="toggleEmojiPanel()">
                    <i class="ph ph-smiley text-2xl"></i>
                </button>
                <textarea id="message-input" rows="1" placeholder="พิมพ์ข้อความ..." class="flex-1 bg-transparent border-none focus:outline-none text-sm text-gray-700 placeholder-gray-400 px-1 py-2.5 resize-none max-h-24 no-scrollbar leading-tight" oninput="autoResize(this)"></textarea>
                
                <input type="file" id="file-upload" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx" onchange="uploadFile(event)">
                <button class="p-1.5 text-gray-400 hover:text-blue-500 transition shrink-0" onclick="document.getElementById('file-upload').click()">
                    <i class="ph ph-paperclip text-xl transform -rotate-45"></i>
                </button>
                <button id="send-btn" class="p-1.5 text-gray-300 hover:text-[#e43a3d] transition shrink-0" onclick="sendMessage()">
                    <i class="ph-fill ph-paper-plane-right text-xl" id="send-icon"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- Script Logic (มี Firebase SDK ฝังอยู่) -->
    <script type="module">
        // นำเข้า Firebase Web SDK โดยตรงจาก Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        const firebaseConfig = {
            databaseURL: "https://surl.li/oeythp"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==========================================
        // ⚠️ อย่าลืมใส่ URL ของ GAS ของคุณตรงนี้ (ใช้สำหรับการส่งข้อความและอัปโหลดไฟล์)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx8Zw7yc9QlPrU9PeaJ6koVbk9UqAZhRIDUSxKvqhQnyc5sp27V0rkxb5FbNKivIfhi/exec";
        // ==========================================

        window.chatUser = null;
        window.messagesArray = []; 
        window.isUploading = false;
        window.uploadingType = ''; 

        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('nextLiveUser');
            if (savedUser) {
                window.chatUser = JSON.parse(savedUser);
                window.startSession();
            } else {
                document.getElementById('guest-screen').classList.remove('hidden');
            }

            document.getElementById('message-input').addEventListener('keydown', (e) => {
                if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
            });
            document.getElementById('message-input').addEventListener('input', window.updateSendButton);
        });

        window.startGuestChat = function(e) {
            e.preventDefault();
            const name = document.getElementById('guest-name').value;
            const phone = document.getElementById('guest-phone').value;
            if(!name || !phone) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');
            
            document.getElementById('btn-start-chat').innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> กำลังเข้าสู่ระบบ...`;
            window.chatUser = { uid: 'GUEST_' + Date.now().toString().slice(-4), fname: name, phone: phone };
            setTimeout(window.startSession, 500);
        }

        window.startSession = function() {
            document.getElementById('guest-screen').classList.add('hidden');
            document.getElementById('chat-room').classList.remove('hidden');
            
            // 🚀 นี่คือส่วนที่เปลี่ยนไปใช้ Firebase SDK (เลิกใช้ setInterval)
            // ติดตามการเปลี่ยนแปลงที่ Sheet 'LiveChat' ตลอดเวลา
            const chatRef = ref(db, 'LiveChat');
            onValue(chatRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                
                let newMessages = [];
                // Firebase อาจส่งมาเป็น Object หรือ Array
                const keys = Object.keys(data);
                keys.forEach(key => {
                    const row = data[key];
                    // คัดกรองเฉพาะข้อความของ User ปัจจุบัน (UID อยู่ใน Index ที่ 2 ของ Array)
                    if (row && row.length > 0 && row[2] === window.chatUser.uid) {
                        newMessages.push({
                            date: row[0], time: row[1], uid: row[2], phone: row[3],
                            userMsg: row[4], adminMsg: row[5], timestamp: row[6]
                        });
                    }
                });

                // เรียงลำดับตามเวลา
                newMessages.sort((a, b) => a.timestamp - b.timestamp);
                
                // หากมีข้อความใหม่ ให้ซ่อนสถานะพิมพ์ และแสดงผล
                if (newMessages.length !== window.messagesArray.length || window.isUploading) {
                    window.messagesArray = newMessages;
                    window.renderAllMessages();
                    window.showTyping(false);
                }
            }, (error) => {
                console.error("Firebase Read Error:", error);
            });
        }

        window.autoResize = function(el) {
            el.style.height = 'auto'; el.style.height = (el.scrollHeight < 96 ? el.scrollHeight : 96) + 'px';
            window.updateSendButton();
        }

        window.updateSendButton = function() {
            const val = document.getElementById('message-input').value.trim();
            const icon = document.getElementById('send-icon');
            if(val.length > 0) { icon.classList.remove('text-gray-300'); icon.classList.add('text-[#e43a3d]'); } 
            else { icon.classList.add('text-gray-300'); icon.classList.remove('text-[#e43a3d]'); }
        }

        window.scrollToBottom = function() { document.getElementById('chat-bottom-anchor').scrollIntoView({ behavior: 'smooth' }); }

        window.toggleEmojiPanel = function() {
            const panel = document.getElementById('emoji-panel');
            if (panel.classList.contains('opacity-0')) {
                panel.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                panel.classList.add('opacity-100', 'scale-100');
            } else { window.closePanels(); }
        }
        
        window.closePanels = function() {
            const panel = document.getElementById('emoji-panel');
            panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            panel.classList.remove('opacity-100', 'scale-100');
        }
        
        window.switchTab = function(tab) {
            if(tab === 'emoji') {
                document.getElementById('tab-emoji').className = "flex-1 py-2 text-sm font-bold text-[#e43a3d] border-b-2 border-[#e43a3d]";
                document.getElementById('tab-sticker').className = "flex-1 py-2 text-sm font-bold text-gray-400 hover:text-gray-600";
                document.getElementById('grid-emoji').classList.remove('hidden'); document.getElementById('grid-sticker').classList.add('hidden');
            } else {
                document.getElementById('tab-sticker').className = "flex-1 py-2 text-sm font-bold text-[#e43a3d] border-b-2 border-[#e43a3d]";
                document.getElementById('tab-emoji').className = "flex-1 py-2 text-sm font-bold text-gray-400 hover:text-gray-600";
                document.getElementById('grid-sticker').classList.remove('hidden'); document.getElementById('grid-emoji').classList.add('hidden');
            }
        }
        
        window.insertEmoji = function(emoji) {
            const inp = document.getElementById('message-input');
            inp.value += emoji; inp.focus(); window.updateSendButton();
        }

        window.getDirectImageUrl = function(url) {
            if (!url) return url;
            const driveMatch = url.match(/(?:drive\.google\.com\/(?:file\/d\/|open\?id=|file\/d\/))([-\w]{25,})/);
            if (driveMatch && driveMatch[1]) { return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`; }
            return url;
        }

        window.renderAdminAvatar = function() {
            return `<div class="w-8 h-8 rounded-full avatar-left bg-red-100 text-[#e43a3d] shadow-sm flex items-center justify-center"><i class="ph-fill ph-headset text-lg"></i></div>`;
        }
        
        window.renderClientAvatar = function() {
            return `<img src="https://ui-avatars.com/api/?name=${window.chatUser ? window.chatUser.fname : 'U'}&background=random" class="w-8 h-8 rounded-full avatar-right object-cover shadow-sm">`;
        }

        window.renderBubble = function(type, content, time) {
            const isUser = type === 'user';
            const timeStr = time || new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            
            let contentHtml = '';
            let isMediaBox = false;

            if (content.startsWith('[IMG]')) {
                let rawUrl = content.replace('[IMG]', '');
                let previewUrl = window.getDirectImageUrl(rawUrl); 
                contentHtml = `<img src="${previewUrl}" class="w-40 h-40 sm:w-48 sm:h-48 object-cover rounded-2xl shadow-sm cursor-pointer border border-gray-200" onclick="window.open('${rawUrl}')" onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=Image+Error';">`;
                isMediaBox = true;
            } else if (content.startsWith('[VID]')) {
                let url = content.replace('[VID]', '');
                contentHtml = `
                    <div class="flex items-center gap-3 cursor-pointer p-2" onclick="window.open('${url}')">
                        <div class="w-12 h-12 ${isUser ? 'bg-white/20 text-white' : 'bg-red-100 text-[#e43a3d]'} rounded-full flex items-center justify-center shrink-0">
                            <i class="ph-fill ph-video-camera text-2xl"></i>
                        </div>
                        <div class="flex flex-col pr-4 ${isUser ? 'text-white' : 'text-gray-800'}">
                            <span class="text-base font-bold leading-tight">ไฟล์วิดีโอ</span>
                            <span class="text-xs ${isUser ? 'text-white/80' : 'text-gray-500'}">แตะเพื่อเล่น</span>
                        </div>
                    </div>`;
            } else if (content.startsWith('[FILE]')) {
                let url = content.replace('[FILE]', '');
                contentHtml = `
                    <div class="flex items-center gap-3 cursor-pointer p-2" onclick="window.open('${url}')">
                        <div class="w-12 h-12 ${isUser ? 'bg-white/20 text-white' : 'bg-red-100 text-[#e43a3d]'} rounded-full flex items-center justify-center shrink-0">
                            <i class="ph-fill ph-file-text text-2xl"></i>
                        </div>
                        <div class="flex flex-col pr-4 ${isUser ? 'text-white' : 'text-gray-800'}">
                            <span class="text-base font-bold leading-tight">ไฟล์เอกสาร</span>
                            <span class="text-xs ${isUser ? 'text-white/80' : 'text-gray-500'}">แตะเพื่อเปิด</span>
                        </div>
                    </div>`;
            } else if (content.startsWith('http') && content.includes('iconify')) {
                contentHtml = `<img src="${content}" class="w-24 h-24 object-contain">`;
                return `<div class="flex flex-col ${isUser ? 'items-end' : 'items-start'} mt-2 mb-1"><div class="sticker-bubble">${isUser ? window.renderClientAvatar() : window.renderAdminAvatar()}${contentHtml}</div></div>`;
            } else {
                contentHtml = content.replace(/\n/g, '<br>');
                contentHtml = contentHtml.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="underline hover:opacity-80">$1</a>');
            }

            if (isUser) {
                if (isMediaBox) {
                    return `
                    <div class="flex flex-col items-end mt-2 mb-1">
                        <div class="relative max-w-[75%]">
                            ${window.renderClientAvatar()}
                            ${contentHtml}
                        </div>
                        <span class="text-[10px] text-gray-400 mt-1">${timeStr}</span>
                    </div>`;
                } else {
                    return `
                    <div class="flex flex-col items-end mt-2 mb-1">
                        <div class="msg-bubble bg-[#5a8ce0] text-white py-2.5 px-4 pr-5 rounded-2xl rounded-tr-sm text-sm shadow-sm">
                            ${window.renderClientAvatar()}
                            ${contentHtml}
                        </div>
                        <span class="text-[10px] text-gray-400 mt-1">${timeStr}</span>
                    </div>`;
                }
            } else {
                if (isMediaBox) {
                    return `
                    <div class="flex flex-col items-start mt-2 mb-1">
                        <div class="relative max-w-[75%]">
                            ${window.renderAdminAvatar()}
                            ${contentHtml}
                        </div>
                        <span class="text-[10px] text-gray-400 mt-1">${timeStr}</span>
                    </div>`;
                } else {
                    return `
                    <div class="flex flex-col items-start mt-2 mb-1">
                        <div class="msg-bubble bg-white text-gray-800 border border-gray-100 py-2.5 px-4 pr-3 rounded-2xl rounded-tl-sm text-sm shadow-sm">
                            ${window.renderAdminAvatar()}
                            ${contentHtml}
                        </div>
                        <span class="text-[10px] text-gray-400 mt-1">${timeStr}</span>
                    </div>`;
                }
            }
        }

        window.getUploadingBubbleHtml = function() {
            let text = 'กำลังส่ง...';
            if(window.uploadingType === 'image') text = 'กำลังส่งรูปภาพ...';
            if(window.uploadingType === 'video') text = 'กำลังส่งวิดีโอ...';
            if(window.uploadingType === 'file') text = 'กำลังส่งเอกสาร...';

            return `
            <div class="flex flex-col items-end mt-2 mb-1">
                <div class="msg-bubble bg-[#5a8ce0] text-white py-2 px-3 pr-4 rounded-2xl rounded-tr-sm text-sm shadow-sm flex items-center gap-3">
                    ${window.renderClientAvatar()}
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                        <i class="ph ph-spinner animate-spin text-xl text-white"></i>
                    </div>
                    <span class="font-medium text-sm pr-2">${text}</span>
                </div>
            </div>`;
        }

        window.renderAllMessages = function() {
            const list = document.getElementById('messages-list');
            list.innerHTML = ''; 
            
            window.messagesArray.forEach(msg => {
                if (msg.userMsg) list.innerHTML += window.renderBubble('user', msg.userMsg, msg.time);
                if (msg.adminMsg) list.innerHTML += window.renderBubble('admin', msg.adminMsg, msg.time);
            });

            if (window.isUploading) {
                list.innerHTML += window.getUploadingBubbleHtml();
            }

            window.scrollToBottom();
        }

        window.showTyping = function(show) {
            document.getElementById('typing-indicator').style.display = show ? 'flex' : 'none';
            if(show) window.scrollToBottom();
        }

        // ==========================================
        // การส่งข้อมูล (เขียนข้อมูล) ยังคงต้องส่งผ่าน GAS 
        // เพื่อให้เก็บลง Sheet และแจ้งเตือนแอดมินได้ถูกต้อง
        // ==========================================
        window.sendMessage = function() {
            const inp = document.getElementById('message-input');
            const text = inp.value.trim();
            if(!text) return;

            // แสดงหลอกๆ ให้หน้าบ้านก่อน (จะหายไปเมื่อ Firebase อัปเดตข้อมูลจริงกลับมา)
            window.messagesArray.push({ userMsg: text, time: new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) });
            window.renderAllMessages();

            inp.value = ''; inp.style.height = 'auto'; window.updateSendButton(); window.closePanels(); window.showTyping(true);

            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'sendChatMessage', uid: window.chatUser.uid, phone: window.chatUser.phone || window.chatUser.fname, message: text, type: 'user' })
            }).catch(() => { window.showTyping(false); });
        }

        window.sendSticker = function(url) {
            window.messagesArray.push({ userMsg: url, time: new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) });
            window.renderAllMessages();
            window.closePanels(); window.showTyping(true);

            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'sendChatMessage', uid: window.chatUser.uid, phone: window.chatUser.phone || window.chatUser.fname, message: url, type: 'user' })
            });
        }

        window.uploadFile = function(e) {
            const file = e.target.files[0]; if(!file) return;
            
            let mime = file.type;
            const ext = file.name.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','webp','heic'].includes(ext)) { mime = 'image/'+ext; window.uploadingType = 'image'; }
            else if (['mp4','mov','avi','mkv'].includes(ext)) { mime = 'video/'+ext; window.uploadingType = 'video'; }
            else { window.uploadingType = 'file'; }

            window.isUploading = true;
            window.renderAllMessages();

            const reader = new FileReader();
            reader.onload = function(evt) {
                const base64 = evt.target.result.split(',')[1];
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'uploadChatFile', filename: file.name, mimeType: mime, base64: base64, uid: window.chatUser.uid, phone: window.chatUser.phone || window.chatUser.fname, type: 'user' })
                }).then(() => {
                    window.isUploading = false;
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
